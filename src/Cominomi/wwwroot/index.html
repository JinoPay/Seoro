<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Cominomi</title>
    <base href="/" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="Cominomi.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div id="app">로딩 중...</div>

    <div id="blazor-error-ui" data-nosnippet>
        처리되지 않은 오류가 발생했습니다.
        <a href="." class="reload">새로고침</a>
        <span class="dismiss">X</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        // Global error capture — surfaces errors hidden by blazor-error-ui
        window.addEventListener('error', function(e) {
            console.error('[Cominomi] Unhandled JS error:', e.message, '\nFile:', e.filename, 'Line:', e.lineno, '\nError:', e.error);
        });
        window.addEventListener('unhandledrejection', function(e) {
            console.error('[Cominomi] Unhandled promise rejection:', e.reason);
        });
    </script>
    <script>
        window.setTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
        };

        window.scrollToBottom = function(elementId) {
            const el = document.getElementById(elementId);
            if (el) el.scrollTop = el.scrollHeight;
        };

        // Scroll position watcher — reports whether user is near bottom
        window.registerScrollWatcher = function(elementId, dotNetRef) {
            var el = document.getElementById(elementId);
            if (!el) return;
            var threshold = 80;
            el._scrollHandler = function() {
                var isAtBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < threshold;
                dotNetRef.invokeMethodAsync('OnScrollPositionChanged', isAtBottom);
            };
            el.addEventListener('scroll', el._scrollHandler, { passive: true });
            el._scrollDotNetRef = dotNetRef;
        };

        window.unregisterScrollWatcher = function(elementId) {
            var el = document.getElementById(elementId);
            if (!el || !el._scrollHandler) return;
            el.removeEventListener('scroll', el._scrollHandler);
            el._scrollHandler = null;
            el._scrollDotNetRef = null;
        };

        // --- Input area handler helpers ---
        // Find the actual input element (textarea or input) inside a container.
        // MudBlazor may render <textarea> or <input> depending on timing/config.
        window._findInputEl = function(container) {
            if (!container) return null;
            return container.querySelector('textarea') || container.querySelector('input.mud-input-slot');
        };

        // Attach all handlers (enter, paste, composition, drop) to a given input element.
        window._attachInputHandlers = function(inputEl, container, dotNetRef) {
            if (!inputEl || inputEl._cominomiHandlers) return; // already attached
            inputEl._cominomiHandlers = true;

            // Disable macOS autocorrect/spellcheck to prevent cursor jumping
            inputEl.setAttribute('spellcheck', 'false');
            inputEl.setAttribute('autocorrect', 'off');
            inputEl.setAttribute('autocomplete', 'off');
            inputEl.setAttribute('autocapitalize', 'off');

            var isTextarea = inputEl.tagName === 'TEXTAREA';

            // --- IME composition tracking (Korean/CJK) ---
            inputEl._isComposing = false;
            inputEl._compositionStartHandler = function() {
                inputEl._isComposing = true;
                dotNetRef.invokeMethodAsync('OnCompositionStart');
            };
            inputEl._compositionEndHandler = function() {
                inputEl._isComposing = false;
                dotNetRef.invokeMethodAsync('OnCompositionEnd');
            };
            inputEl.addEventListener('compositionstart', inputEl._compositionStartHandler);
            inputEl.addEventListener('compositionend', inputEl._compositionEndHandler);

            // --- Enter / Shift+Enter ---
            inputEl._enterHandler = function(e) {
                if (e.key === 'Enter' && !e.isComposing && !inputEl._isComposing) {
                    e.preventDefault();
                    if (e.shiftKey && isTextarea) {
                        var start = inputEl.selectionStart;
                        var end = inputEl.selectionEnd;
                        var newValue = inputEl.value.substring(0, start) + '\n' + inputEl.value.substring(end);
                        inputEl.value = newValue;
                        inputEl.selectionStart = inputEl.selectionEnd = start + 1;
                        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
                        inputEl.dispatchEvent(new Event('change', { bubbles: true }));
                        inputEl.style.height = 'auto';
                        inputEl.style.height = inputEl.scrollHeight + 'px';
                        // Sync value to C# directly (synthetic events may not trigger Blazor binding)
                        dotNetRef.invokeMethodAsync('OnNewlineInserted', newValue);
                    } else {
                        dotNetRef.invokeMethodAsync('SendFromJs');
                    }
                }
            };
            inputEl.addEventListener('keydown', inputEl._enterHandler);

            // --- Paste (images/files from clipboard) ---
            inputEl._pasteHandler = async function(e) {
                if (e._cominomiHandled) return; // prevent duplicate via bubbling
                e._cominomiHandled = true;

                var items = e.clipboardData?.items;
                var hasFileItem = false;

                // Primary: extract files from clipboardData.items
                if (items && items.length > 0) {
                    for (var i = 0; i < items.length; i++) {
                        var item = items[i];
                        if (item.kind === 'file') {
                            hasFileItem = true;
                            e.preventDefault();
                            var file = item.getAsFile();
                            if (!file) continue;
                            try {
                                var buffer = await file.arrayBuffer();
                                var bytes = new Uint8Array(buffer);
                                await dotNetRef.invokeMethodAsync('OnFilePasted',
                                    file.name || 'pasted-image.png',
                                    file.type || 'application/octet-stream',
                                    Array.from(bytes));
                            } catch (err) {
                                console.error('[Cominomi:paste] file read error:', err);
                            }
                        }
                    }
                }

                // Fallback: if no file items in clipboardData, try Clipboard API
                if (!hasFileItem && navigator.clipboard && navigator.clipboard.read) {
                    try {
                        var clipboardItems = await navigator.clipboard.read();
                        for (var ci = 0; ci < clipboardItems.length; ci++) {
                            var types = clipboardItems[ci].types;
                            for (var ti = 0; ti < types.length; ti++) {
                                var type = types[ti];
                                if (type.startsWith('image/')) {
                                    e.preventDefault();
                                    var blob = await clipboardItems[ci].getType(type);
                                    var buf = await blob.arrayBuffer();
                                    var arr = new Uint8Array(buf);
                                    var ext = type.split('/')[1] || 'png';
                                    await dotNetRef.invokeMethodAsync('OnFilePasted',
                                        'pasted-image.' + ext, type, Array.from(arr));
                                }
                            }
                        }
                    } catch (_) {
                        // Permission denied or no image — let text paste proceed normally
                    }
                }
            };
            inputEl.addEventListener('paste', inputEl._pasteHandler);

            // Also listen on container for paste capture when textarea isn't focused
            if (container && !container._cominomiPasteHandler) {
                container._cominomiPasteHandler = inputEl._pasteHandler;
                container.addEventListener('paste', container._cominomiPasteHandler);
            }
        };

        // Detach all handlers from an input element.
        window._detachInputHandlers = function(inputEl) {
            if (!inputEl || !inputEl._cominomiHandlers) return;
            if (inputEl._enterHandler) inputEl.removeEventListener('keydown', inputEl._enterHandler);
            if (inputEl._compositionStartHandler) inputEl.removeEventListener('compositionstart', inputEl._compositionStartHandler);
            if (inputEl._compositionEndHandler) inputEl.removeEventListener('compositionend', inputEl._compositionEndHandler);
            if (inputEl._pasteHandler) inputEl.removeEventListener('paste', inputEl._pasteHandler);
            inputEl._cominomiHandlers = false;
        };

        // --- Public registration: uses MutationObserver to handle late/replaced elements ---
        window.registerInputHandlers = function(elementId, dotNetRef) {
            var container = document.getElementById(elementId);
            if (!container) return;

            // Try to attach immediately
            var inputEl = window._findInputEl(container);
            if (inputEl) {
                window._attachInputHandlers(inputEl, container, dotNetRef);
            }

            // Watch for textarea/input being added or replaced by MudBlazor
            var observer = new MutationObserver(function() {
                var current = window._findInputEl(container);
                if (current && !current._cominomiHandlers) {
                    window._attachInputHandlers(current, container, dotNetRef);
                }
            });
            observer.observe(container, { childList: true, subtree: true });
            container._inputObserver = observer;
            container._dotNetRef = dotNetRef;

            // Drop handlers on the container itself
            container._dragOverHandler = function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                container.classList.add('drop-active');
            };
            container._dragLeaveHandler = function(e) {
                container.classList.remove('drop-active');
            };
            container._dropHandler = async function(e) {
                e.preventDefault();
                container.classList.remove('drop-active');
                var files = e.dataTransfer?.files;
                if (!files) return;
                for (var i = 0; i < files.length; i++) {
                    var file = files[i];
                    var buffer = await file.arrayBuffer();
                    var bytes = new Uint8Array(buffer);
                    await dotNetRef.invokeMethodAsync('OnFileDropped',
                        file.name, file.type || 'application/octet-stream',
                        Array.from(bytes));
                }
            };
            container.addEventListener('dragover', container._dragOverHandler);
            container.addEventListener('dragleave', container._dragLeaveHandler);
            container.addEventListener('drop', container._dropHandler);
        };

        window.unregisterInputHandlers = function(elementId) {
            var container = document.getElementById(elementId);
            if (!container) return;
            // Stop observer
            if (container._inputObserver) {
                container._inputObserver.disconnect();
                container._inputObserver = null;
            }
            // Detach input element handlers
            var inputEl = window._findInputEl(container);
            window._detachInputHandlers(inputEl);
            // Detach container paste handler
            if (container._cominomiPasteHandler) {
                container.removeEventListener('paste', container._cominomiPasteHandler);
                container._cominomiPasteHandler = null;
            }
            // Detach drop handlers
            if (container._dragOverHandler) container.removeEventListener('dragover', container._dragOverHandler);
            if (container._dragLeaveHandler) container.removeEventListener('dragleave', container._dragLeaveHandler);
            if (container._dropHandler) container.removeEventListener('drop', container._dropHandler);
        };

        window.clearInputArea = function(elementId) {
            var container = document.getElementById(elementId);
            if (!container) return;
            var inputEl = window._findInputEl(container);
            if (inputEl) {
                inputEl.value = '';
                inputEl.style.height = '';
                inputEl.dispatchEvent(new Event('input', { bubbles: true }));
                inputEl.dispatchEvent(new Event('change', { bubbles: true }));
            }
        };

        // Legacy aliases — keep for backward compat during transition
        window.registerPasteHandler = function() {};
        window.registerDropHandler = function() {};
        window.registerEnterHandler = function() {};
        window.unregisterFileHandlers = function(id) { window.unregisterInputHandlers(id); };
        window.unregisterEnterHandler = function() {};

        window.isWindowFocused = function() {
            return document.hasFocus();
        };

        window.registerWindowFocusTracker = function(dotNetRef) {
            window._focusTrackerRef = dotNetRef;
            var notify = function(focused) {
                if (window._focusTrackerRef) {
                    window._focusTrackerRef.invokeMethodAsync('OnWindowFocusChanged', focused);
                }
            };
            document.addEventListener('visibilitychange', function() { notify(!document.hidden); });
            window.addEventListener('focus', function() { notify(true); });
            window.addEventListener('blur', function() { notify(false); });
        };
        window.unregisterWindowFocusTracker = function() {
            window._focusTrackerRef = null;
        };

        window.registerSessionShortcuts = function(dotNetRef) {
            if (window._sessionShortcutHandler) {
                document.removeEventListener('keydown', window._sessionShortcutHandler);
            }
            window._sessionShortcutHandler = function(e) {
                var isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
                var modifier = isMac ? e.metaKey : e.ctrlKey;
                if (modifier && e.key >= '1' && e.key <= '5') {
                    e.preventDefault();
                    var index = parseInt(e.key) - 1;
                    dotNetRef.invokeMethodAsync('OnSessionShortcut', index);
                }
            };
            document.addEventListener('keydown', window._sessionShortcutHandler);
        };

        window.unregisterSessionShortcuts = function() {
            if (window._sessionShortcutHandler) {
                document.removeEventListener('keydown', window._sessionShortcutHandler);
                window._sessionShortcutHandler = null;
            }
        };

        // --- Ctrl/⌘ Key Watcher (for shortcut label reveal) ---
        window.registerCtrlWatcher = function(dotNetRef) {
            var isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
            window._ctrlDownHandler = function(e) {
                if ((isMac && e.key === 'Meta') || (!isMac && e.key === 'Control')) {
                    dotNetRef.invokeMethodAsync('OnCtrlStateChanged', true);
                }
            };
            window._ctrlUpHandler = function(e) {
                if ((isMac && e.key === 'Meta') || (!isMac && e.key === 'Control')) {
                    dotNetRef.invokeMethodAsync('OnCtrlStateChanged', false);
                }
            };
            window._ctrlBlurHandler = function() {
                dotNetRef.invokeMethodAsync('OnCtrlStateChanged', false);
            };
            document.addEventListener('keydown', window._ctrlDownHandler);
            document.addEventListener('keyup', window._ctrlUpHandler);
            window.addEventListener('blur', window._ctrlBlurHandler);
        };

        window.unregisterCtrlWatcher = function() {
            if (window._ctrlDownHandler) {
                document.removeEventListener('keydown', window._ctrlDownHandler);
                document.removeEventListener('keyup', window._ctrlUpHandler);
                window.removeEventListener('blur', window._ctrlBlurHandler);
                window._ctrlDownHandler = null;
                window._ctrlUpHandler = null;
                window._ctrlBlurHandler = null;
            }
        };

        // --- Panel Resizer ---
        window.registerPanelResizer = function(element, dotNetRef, minSize, maxSize, reverse) {
            if (!element) return;
            element._resizerData = { dotNetRef, minSize, maxSize, reverse };

            element._onMouseDown = function(e) {
                e.preventDefault();
                var data = element._resizerData;
                var startX = e.clientX;
                var shell = element.closest('.cominomi-shell');

                // Get current computed size of the adjacent panel
                var panel = reverse
                    ? element.nextElementSibling
                    : element.previousElementSibling;
                if (!panel) return;
                var startWidth = panel.getBoundingClientRect().width;

                var onMouseMove = function(e2) {
                    var dx = e2.clientX - startX;
                    var newSize = reverse ? startWidth - dx : startWidth + dx;
                    newSize = Math.round(Math.max(data.minSize, Math.min(data.maxSize, newSize)));

                    if (shell) {
                        // Inside shell: use CSS variables for sidebar/detail
                        if (reverse) {
                            shell.style.setProperty('--detail-width', newSize + 'px');
                        } else {
                            shell.style.setProperty('--sidebar-width', newSize + 'px');
                        }
                    } else {
                        // Outside shell (e.g. chat-split): set width directly
                        panel.style.width = newSize + 'px';
                    }

                    data.dotNetRef.invokeMethodAsync('OnDragResize', newSize);
                };

                var onMouseUp = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    data.dotNetRef.invokeMethodAsync('OnDragEnd');
                };

                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };

            element.addEventListener('mousedown', element._onMouseDown);
        };

        window.unregisterPanelResizer = function(element) {
            if (!element || !element._onMouseDown) return;
            element.removeEventListener('mousedown', element._onMouseDown);
            element._resizerData = null;
        };

        // --- Keyboard Navigation: Ctrl/Cmd+B toggle sidebar, Ctrl/Cmd+] toggle detail ---
        window.registerPanelShortcuts = function(dotNetRef) {
            if (window._panelShortcutHandler) {
                document.removeEventListener('keydown', window._panelShortcutHandler);
            }
            window._panelShortcutHandler = function(e) {
                var isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
                var modifier = isMac ? e.metaKey : e.ctrlKey;
                if (!modifier) return;

                if (e.key === 'b' || e.key === 'B') {
                    e.preventDefault();
                    dotNetRef.invokeMethodAsync('OnToggleSidebarShortcut');
                }
            };
            document.addEventListener('keydown', window._panelShortcutHandler);
        };

        window.unregisterPanelShortcuts = function() {
            if (window._panelShortcutHandler) {
                document.removeEventListener('keydown', window._panelShortcutHandler);
                window._panelShortcutHandler = null;
            }
        };
    </script>

</body>

</html>
