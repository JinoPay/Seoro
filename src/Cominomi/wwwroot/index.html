<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Cominomi</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="Cominomi.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div id="app">로딩 중...</div>

    <div id="blazor-error-ui" data-nosnippet>
        처리되지 않은 오류가 발생했습니다.
        <a href="." class="reload">새로고침</a>
        <span class="dismiss">X</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        window.setTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
        };

        window.scrollToBottom = function(elementId) {
            const el = document.getElementById(elementId);
            if (el) el.scrollTop = el.scrollHeight;
        };

        window.registerPasteHandler = function(elementId, dotNetRef) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el._pasteHandler = async function(e) {
                const items = e.clipboardData?.items;
                if (!items) return;
                for (const item of items) {
                    if (item.kind === 'file') {
                        e.preventDefault();
                        const file = item.getAsFile();
                        if (!file) continue;
                        const buffer = await file.arrayBuffer();
                        const bytes = new Uint8Array(buffer);
                        await dotNetRef.invokeMethodAsync('OnFilePasted',
                            file.name || 'pasted-image.png',
                            file.type || 'application/octet-stream',
                            Array.from(bytes));
                    }
                }
            };
            el.addEventListener('paste', el._pasteHandler);
        };

        window.registerDropHandler = function(elementId, dotNetRef) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el._dragOverHandler = function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                el.classList.add('drop-active');
            };
            el._dragLeaveHandler = function(e) {
                el.classList.remove('drop-active');
            };
            el._dropHandler = async function(e) {
                e.preventDefault();
                el.classList.remove('drop-active');
                const files = e.dataTransfer?.files;
                if (!files) return;
                for (const file of files) {
                    const buffer = await file.arrayBuffer();
                    const bytes = new Uint8Array(buffer);
                    await dotNetRef.invokeMethodAsync('OnFileDropped',
                        file.name, file.type || 'application/octet-stream',
                        Array.from(bytes));
                }
            };
            el.addEventListener('dragover', el._dragOverHandler);
            el.addEventListener('dragleave', el._dragLeaveHandler);
            el.addEventListener('drop', el._dropHandler);
        };

        window.unregisterFileHandlers = function(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (el._pasteHandler) el.removeEventListener('paste', el._pasteHandler);
            if (el._dragOverHandler) el.removeEventListener('dragover', el._dragOverHandler);
            if (el._dragLeaveHandler) el.removeEventListener('dragleave', el._dragLeaveHandler);
            if (el._dropHandler) el.removeEventListener('drop', el._dropHandler);
        };

        window.registerEnterHandler = function(elementId, dotNetRef) {
            var container = document.getElementById(elementId);
            if (!container) return;
            var textarea = container.querySelector('textarea');
            if (!textarea || textarea._enterHandler) return; // Already registered → skip
            textarea._enterHandler = function(e) {
                if (e.key === 'Enter' && !e.isComposing) {
                    e.preventDefault();
                    if (e.shiftKey) {
                        var start = textarea.selectionStart;
                        var end = textarea.selectionEnd;
                        textarea.value = textarea.value.substring(0, start) + '\n' + textarea.value.substring(end);
                        textarea.selectionStart = textarea.selectionEnd = start + 1;
                        textarea.dispatchEvent(new Event('input', { bubbles: true }));
                        textarea.dispatchEvent(new Event('change', { bubbles: true }));
                        textarea.style.height = 'auto';
                        textarea.style.height = textarea.scrollHeight + 'px';
                    } else {
                        dotNetRef.invokeMethodAsync('SendFromJs');
                    }
                }
            };
            textarea.addEventListener('keydown', textarea._enterHandler);
        };

        window.clearInputArea = function(elementId) {
            var textarea = document.getElementById(elementId)?.querySelector('textarea');
            if (textarea && textarea.value !== '') {
                textarea.value = '';
                textarea.dispatchEvent(new Event('input', { bubbles: true }));
            }
        };

        window.unregisterEnterHandler = function(elementId) {
            const container = document.getElementById(elementId);
            if (!container) return;
            const textarea = container.querySelector('textarea');
            if (!textarea || !textarea._enterHandler) return;
            textarea.removeEventListener('keydown', textarea._enterHandler);
        };
    </script>

</body>

</html>
