name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore tools
        run: dotnet tool restore

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish src/Seoro.Desktop/Seoro.Desktop.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o publish/win

      - name: Download previous release (for delta updates)
        run: >
          dotnet vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --channel win
          --outputDir releases/win
          --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          dotnet vpk pack
          --packId Seoro
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish/win
          --mainExe Seoro.Desktop.exe
          --icon src/Seoro.Desktop/icon.ico
          --channel win
          --outputDir releases/win

      # Code signing placeholder:
      # --signParams "/a /fd sha256 /tr http://timestamp.digicert.com /td sha256"

      - name: Upload to GitHub Release
        run: >
          dotnet vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --tag ${{ github.ref_name }}
          --channel win
          --outputDir releases/win
          --merge
          --token ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore tools
        run: dotnet tool restore

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish (arm64)
        run: >
          dotnet publish src/Seoro.Desktop/Seoro.Desktop.csproj
          -c Release
          -r osx-arm64
          --self-contained
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o publish/mac

      - name: Create macOS .app bundle
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p "publish/Seoro.app/Contents/MacOS"
          mkdir -p "publish/Seoro.app/Contents/Resources"
          cp -R publish/mac/* "publish/Seoro.app/Contents/MacOS/"
          cp src/Seoro.Desktop/icon.icns "publish/Seoro.app/Contents/Resources/app.icns"
          cat > "publish/Seoro.app/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Seoro</string>
            <key>CFBundleDisplayName</key>
            <string>Seoro</string>
            <key>CFBundleIdentifier</key>
            <string>com.seoro.app</string>
            <key>CFBundleExecutable</key>
            <string>Seoro.Desktop</string>
            <key>CFBundleIconFile</key>
            <string>app.icns</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSUserNotificationAlertStyle</key>
            <string>alert</string>
            <key>LSEnvironment</key>
            <dict>
              <key>OBJC_DISABLE_INITIALIZE_FORK_SAFETY</key>
              <string>YES</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Download previous release (for delta updates)
        run: >
          dotnet vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --channel osx
          --outputDir releases/mac
          --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          dotnet vpk pack
          --packId Seoro
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish/Seoro.app
          --mainExe Seoro.Desktop
          --channel osx
          --outputDir releases/mac

      # Code signing placeholder:
      # --signAppIdentity "Developer ID Application: Company Name (TEAM_ID)"
      # --signInstallIdentity "Developer ID Installer: Company Name (TEAM_ID)"
      # --notaryProfile "MyNotaryProfile"

      - name: Upload to GitHub Release
        run: >
          dotnet vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --tag ${{ github.ref_name }}
          --channel osx
          --outputDir releases/mac
          --merge
          --token ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [release-windows, release-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --repo ${{ github.repository }} --draft=false
